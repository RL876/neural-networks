<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Doodle</title>
    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Doodle Canvas -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.1/jquery.js" type="text/javascript"></script>
    <script src="https://code.jquery.com/jquery-2.1.4.min.js"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='/favicon.ico') }}" />
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <!-- Core theme JS-->
    <script src="{{ url_for('static', filename='/scripts.js') }}"></script>
    <script src="/static/scripts.js"></script>
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="{{ url_for('static', filename='/styles.css') }}" rel="stylesheet" />
    <link href="/static/styles.css" rel="stylesheet" />
</head>

<body scroll="no">
    <div id="content" class="container main-container">
        <div class="row text-center">
            <h1>Doodle</h1>
            <h4>{{ labels }}</h4>
            <canvas id="inputCanvas" width="280" height="280"></canvas>
        </div>
        <div class="row text-center">
            <button class="btn btn-primary" id="clearButton">Clear</button>
            <button class="btn btn-primary" id="sendButton">Send data</button>
        </div>
        <div class="row text-center">
            <h4>Result : {{ result }}</h4>
            {% for k, v in scores.items() %}
            <h4>{{ k }} : {{ v }}</h4>
            {% endfor %}
        </div>
    </div>
    <div id="footer" class="container text-center">
        <h5>Copyright &copy; Robert 2022</h5>
    </div>
    <footer>
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    </footer>
</body>

</html>
